<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="handoff — pause work in one session, pick up cleanly in the next">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1F1B1A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#F5F0E8"/>

  <!-- Title -->
  <text x="80" y="135" font-size="82" font-weight="700" fill="#1F1B1A" letter-spacing="-2">handoff</text>

  <!-- Subtitle -->
  <text x="82" y="180" font-size="22" font-weight="400" fill="#4A4441">Pause work in one session.</text>
  <text x="82" y="210" font-size="22" font-weight="400" fill="#4A4441">Pick up cleanly in the next.</text>

  <!-- Tag -->
  <text x="82" y="248" font-size="13" font-weight="600" fill="#8B7E6F" letter-spacing="3">CLAUDE CODE SKILL</text>

  <!-- ─────── Right-side illustration ─────── -->

  <!-- Session 1 (paused) -->
  <g transform="translate(710, 90)">
    <rect x="0" y="0" width="110" height="120" rx="8" fill="#FFFFFF" stroke="#1F1B1A" stroke-width="2"/>
    <rect x="0" y="0" width="110" height="22" rx="8" fill="#1F1B1A"/>
    <rect x="0" y="14" width="110" height="8" fill="#1F1B1A"/>
    <circle cx="13" cy="11" r="3" fill="#CC785C"/>
    <circle cx="24" cy="11" r="3" fill="#E5D5B7"/>
    <circle cx="35" cy="11" r="3" fill="#8B7E6F"/>
    <rect x="14" y="36" width="72" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="50" width="56" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="64" width="82" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="78" width="40" height="6" rx="2" fill="#C8C2B8"/>
    <text x="55" y="108" font-size="11" font-weight="600" fill="#8B7E6F" text-anchor="middle" letter-spacing="1">PAUSED</text>
  </g>

  <!-- Arrow: Session 1 → Document -->
  <path d="M 825 150 L 853 150" stroke="#1F1B1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- HANDOFF.md document -->
  <g transform="translate(860, 100)">
    <path d="M 0,0 L 70,0 L 90,18 L 90,100 L 0,100 Z" fill="#FFFFFF" stroke="#CC785C" stroke-width="2"/>
    <path d="M 70,0 L 70,18 L 90,18" fill="none" stroke="#CC785C" stroke-width="2"/>
    <path d="M 70,0 L 70,18 L 90,18 L 70,0 Z" fill="#CC785C" opacity="0.12"/>
    <rect x="10" y="14" width="50" height="5" rx="1" fill="#1F1B1A"/>
    <rect x="10" y="28" width="36" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="36" width="60" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="44" width="42" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="52" width="55" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="60" width="38" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="68" width="65" height="3" rx="1" fill="#C8C2B8"/>
    <rect x="10" y="76" width="48" height="3" rx="1" fill="#C8C2B8"/>
    <text x="45" y="94" font-size="8" font-weight="700" fill="#CC785C" text-anchor="middle" letter-spacing="0.5">HANDOFF.md</text>
  </g>

  <!-- Arrow: Document → Session 2 -->
  <path d="M 957 150 L 1015 150" stroke="#1F1B1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Session 2 (resumed) -->
  <g transform="translate(1020, 90)">
    <rect x="0" y="0" width="110" height="120" rx="8" fill="#FFFFFF" stroke="#1F1B1A" stroke-width="2"/>
    <rect x="0" y="0" width="110" height="22" rx="8" fill="#1F1B1A"/>
    <rect x="0" y="14" width="110" height="8" fill="#1F1B1A"/>
    <circle cx="13" cy="11" r="3" fill="#CC785C"/>
    <circle cx="24" cy="11" r="3" fill="#E5D5B7"/>
    <circle cx="35" cy="11" r="3" fill="#8B7E6F"/>
    <rect x="14" y="36" width="82" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="50" width="44" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="64" width="72" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="78" width="58" height="6" rx="2" fill="#C8C2B8"/>
    <rect x="14" y="50" width="3" height="6" fill="#CC785C"/>
    <text x="55" y="108" font-size="11" font-weight="600" fill="#CC785C" text-anchor="middle" letter-spacing="1">RESUMED</text>
  </g>
</svg>
